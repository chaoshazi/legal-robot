global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

receivers:
  - name: "default"
    # No-op receiver — alerts appear in the Alertmanager UI at http://localhost:9093
    # To enable notifications, replace with one of:
    #   - webhook (飞书/企业微信/DingTalk)
    #   - email_configs
    #   - slack_configs
    # Example webhook (feishu):
    # webhook_configs:
    #   - url: "https://open.feishu.cn/open-apis/bot/v2/hook/your-webhook-url"
    #     send_resolved: true
