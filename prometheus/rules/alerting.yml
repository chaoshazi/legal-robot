groups:
  - name: legal_bot_alerts
    interval: 30s
    rules:

      # ── Backend availability ──
      - alert: BackendDown
        expr: up{job="backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可达"
          description: "Prometheus 无法抓取 backend 任务已超过 1 分钟。"

      # ── Error rate ──
      - alert: HighErrorRate
        expr: |
          rate(legal_bot_errors_total[5m])
          /
          (rate(legal_bot_requests_total[5m]) + 1)
          > 0.05
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "错误率超过 5%"
          description: "最近 5 分钟错误率为 {{ $value | humanizePercentage }}，超过 5% 阈值。"

      # ── High latency ──
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 延迟超过 10s"
          description: "最近 5 分钟 P95 延迟为 {{ $value }}s，超过 10s 阈值。"

      # ── Audit log cleanup failure ──
      - alert: AuditLogCleanupFailing
        expr: |
          rate(legal_bot_audit_log_cleanup_total{status="error"}[5m]) > 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "审计日志清理失败"
          description: "审计日志 180 天清理任务最近 5 分钟持续失败。"

      # ── Cache hit rate dropped ──
      - alert: CacheHitRateDropped
        expr: |
          rate(legal_bot_cache_hits_total[10m])
          /
          (rate(legal_bot_cache_hits_total[10m]) + rate(legal_bot_cache_misses_total[10m]) + 1)
          < 0.3
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "语义缓存命中率低于 30%"
          description: "最近 10 分钟缓存命中率为 {{ $value | humanizePercentage }}，低于 30%。"
