# Qdrant cluster mode — run alongside docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.qdrant-cluster.yml up -d
#
# This starts 3 Qdrant nodes in cluster mode with replication factor 2.
# The application must point QDRANT_HOST to the first node (or a load balancer).
services:
  qdrant-node-0:
    image: qdrant/qdrant:v1.13
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_0:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-0"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-0:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    command: ["sh", "-c", "ulimit -n 10000 && ./qdrant --uri http://qdrant-node-0:6335"]

  qdrant-node-1:
    image: qdrant/qdrant:v1.13
    volumes:
      - qdrant_data_1:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-1"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-1:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      qdrant-node-0:
        condition: service_started
    command: >
      sh -c "sleep 5 && ./qdrant --uri http://qdrant-node-1:6335 --bootstrap http://qdrant-node-0:6335"

  qdrant-node-2:
    image: qdrant/qdrant:v1.13
    volumes:
      - qdrant_data_2:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-2"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-2:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      qdrant-node-0:
        condition: service_started
    command: >
      sh -c "sleep 5 && ./qdrant --uri http://qdrant-node-2:6335 --bootstrap http://qdrant-node-0:6335"

volumes:
  qdrant_data_0:
  qdrant_data_1:
  qdrant_data_2:
