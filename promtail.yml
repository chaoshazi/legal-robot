# Promtail config — collects container logs + backend log file → Loki
# All labels are added as Loki label selectors so you can filter by them.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── All Docker containers ──────────────────────────────────────────
  # Each container's JSON log file is scraped and labelled with its
  # docker-compose service name so you can filter by service in Grafana.
  - job_name: docker
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "docker"
          __path__: "/var/lib/docker/containers/*/*-json.log"
    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            time: time
            attrs: attrs
      - regex:
          # Extract docker-compose service name from container labels
          expression: (?P<container_name>[a-zA-Z0-9_-]+)
          source: "attrs.com.docker.compose.service"
      - labels:
          container_name:
      - timestamp:
          source: time
          format: RFC3339Nano
      # If output has been parsed already (JSON log), send it through
      - output:
          source: output

  # ── Backend log file (host‐mode / manual uvicorn) ─────────────────
  # Covers logs from backend started directly on host (port 8888).
  - job_name: backend
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "backend"
          __path__: "/tmp/backend*.log"
    pipeline_stages:
      - regex:
          expression: "^(?P<time>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) \\[(?P<level>\\w+)\\] (?P<logger>[^:]+): (?P<message>.*)"
      - timestamp:
          source: time
          format: "2006-01-02 15:04:05"
      - labels:
          level:
      - output:
          source: message

  # ── Nginx access log (from Docker container) ──────────────────────
  - job_name: nginx
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "nginx"
          __path__: "/var/lib/docker/containers/*/nginx-access.log"  # if custom nginx log
    pipeline_stages: []
