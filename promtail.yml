server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ── Docker containers via log files ──────────────────────────
  # Each container's JSON log is tailed directly.
  # Only entries newer than 5 minutes are sent (avoids re-sending
  # old logs after restarts).
  - job_name: docker
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "docker"
          __path__: "/var/lib/docker/containers/*/*-json.log"
    pipeline_stages:
      # Parse Docker JSON log format: {"log":"...","stream":"stdout","time":"..."}
      - json:
          expressions:
            log: log
            stream: stream
            time: time
      # Set stream label (stdout / stderr)
      - labels:
          stream:
      # Parse timestamp from Docker format
      - timestamp:
          source: time
          format: RFC3339Nano
      # Drop entries older than 5 minutes (avoids re-sending old logs)
      - drop:
          older_than: 5m
      # Output the log line
      - output:
          source: log

  # ── Backend log file (host‐mode / manual uvicorn) ──────────────
  - job_name: backend
    static_configs:
      - targets: ["localhost"]
        labels:
          job: "backend"
          __path__: "/tmp/backend*.log"
    pipeline_stages:
      - regex:
          expression: "^(?P<time>\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}) \\[(?P<level>\\w+)\\] (?P<logger>[^:]+): (?P<message>.*)"
      - timestamp:
          source: time
          format: "2006-01-02 15:04:05"
      - labels:
          level:
      - output:
          source: message
