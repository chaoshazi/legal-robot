# Development environment. For production, use docker-compose.prod.yml.
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-legalbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0
    ports:
      - "3031:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0
    ports:
      - "3101:3100"
    volumes:
      - ./loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /tmp:/tmp:ro
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /run/promtail
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://legalbot:change_me_in_prod@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-X02nDeFJQO8UJEsovIelxHFAsgyjP91sMe04NQMWe7U=}
      NEXTAUTH_URL: http://101.37.231.123:3002
      SALT: ${LANGFUSE_SALT:-GS0NMFEq4pWKmgdCen7LceL34EFjV5pTTKo5hikOzV4=}
      INIT_ROOT_EMAIL: admin@legalbot.local
      INIT_ROOT_PASSWORD: admin123456
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data:
  prometheus_data:
  grafana_data:
  loki_data:
