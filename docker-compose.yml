# Development environment. For production, use docker-compose.prod.yml.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-legalbot}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legalbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Qdrant 3-node cluster — node-0 exposes ports, node-1/2 join via bootstrap
  qdrant-node-0:
    image: qdrant/qdrant:v1.13
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_0:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-0"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-0:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    command: ["sh", "-c", "ulimit -n 10000 && ./qdrant --uri http://qdrant-node-0:6335"]

  qdrant-node-1:
    image: qdrant/qdrant:v1.13
    volumes:
      - qdrant_data_1:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-1"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-1:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      qdrant-node-0:
        condition: service_started
    command: >
      sh -c "sleep 5 && ./qdrant --uri http://qdrant-node-1:6335 --bootstrap http://qdrant-node-0:6335"

  qdrant-node-2:
    image: qdrant/qdrant:v1.13
    volumes:
      - qdrant_data_2:/qdrant/storage
    environment:
      QDRANT__CLUSTER__ENABLED: "true"
      QDRANT__CLUSTER__NODE_NAME: "node-2"
      QDRANT__CLUSTER__GRPC__PORT: "6334"
      QDRANT__CLUSTER__URI: "http://qdrant-node-2:6335"
      QDRANT__CLUSTER__REPLICATION_FACTOR: "2"
      QDRANT__CLUSTER__WRITE_CONSISTENCY_FACTOR: "2"
      QDRANT__CLUSTER__READ_CONSISTENCY_FACTOR: "1"
      QDRANT__LOG_LEVEL: info
    restart: unless-stopped
    depends_on:
      qdrant-node-0:
        condition: service_started
    command: >
      sh -c "sleep 5 && ./qdrant --uri http://qdrant-node-2:6335 --bootstrap http://qdrant-node-0:6335"

  backend:
    build: ./backend
    env_file: .env
    environment:
      QDRANT_HOST: qdrant-node-0
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8888:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant-node-0:
        condition: service_started
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "5175:5175"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.0
    ports:
      - "9091:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0
    ports:
      - "3031:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0
    ports:
      - "3101:3100"
    volumes:
      - ./loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yaml
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.0
    volumes:
      - ./promtail.yml:/etc/promtail/promtail.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /tmp:/tmp:ro
      - /var/run/docker.sock:/var/run/docker.sock
    tmpfs:
      - /run/promtail
    command: -config.file=/etc/promtail/promtail.yml
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://legalbot:change_me_in_prod@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-X02nDeFJQO8UJEsovIelxHFAsgyjP91sMe04NQMWe7U=}
      NEXTAUTH_URL: http://101.37.231.123:3002
      SALT: ${LANGFUSE_SALT:-GS0NMFEq4pWKmgdCen7LceL34EFjV5pTTKo5hikOzV4=}
      INIT_ROOT_EMAIL: admin@legalbot.local
      INIT_ROOT_PASSWORD: admin123456
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  qdrant_data_0:
  qdrant_data_1:
  qdrant_data_2:
  prometheus_data:
  grafana_data:
  loki_data:
  redis_data:
